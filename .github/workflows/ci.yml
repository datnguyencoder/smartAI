name: CI

on:
  workflow_dispatch:
    inputs:
      backend:
        description: Run backend Maven verify
        type: boolean
        default: true
      frontend:
        description: Run frontend build
        type: boolean
        default: true
      ai_service:
        description: Run AI service tests
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  backend:
    if: github.actor == 'datnguyencoder' && inputs.backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B verify

  frontend:
    if: github.actor == 'datnguyencoder' && inputs.frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  ai-service:
    if: github.actor == 'datnguyencoder' && inputs.ai_service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-service/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/ -q
