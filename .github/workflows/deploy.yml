name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/datnguyencoder/smartai-backend
  IMAGE_AI: ghcr.io/datnguyencoder/smartai-ai-service

jobs:
  # ── Notify: Build Started ──────────────────────────────────────────────────
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Telegram — Build Started
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            🚀 <b>SmartAI — Build Started</b>

            ├ <b>Commit:</b> <code>${{ github.sha }}</code>
            ├ <b>Branch:</b> ${{ github.ref_name }}
            ├ <b>By:</b> ${{ github.actor }}
            └ <b>Message:</b> ${{ github.event.head_commit.message }}

            ⏳ Đang build Backend + AI Service...

  # ── Build Backend ──────────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: cd backend && ./mvnw -B package -DskipTests

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Telegram — Backend OK
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: "✅ <b>Backend image built & pushed</b> → GHCR"

      - name: Telegram — Backend FAILED
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            ❌ <b>Backend Build FAILED!</b>

            ├ <b>Commit:</b> <code>${{ github.sha }}</code>
            └ <b>Log:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ── Build AI Service ───────────────────────────────────────────────────────
  build-ai-service:
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_AI }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: ai-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Telegram — AI Service OK
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: "✅ <b>AI Service image built & pushed</b> → GHCR"

      - name: Telegram — AI Service FAILED
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            ❌ <b>AI Service Build FAILED!</b>

            ├ <b>Commit:</b> <code>${{ github.sha }}</code>
            └ <b>Log:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ── Deploy to VPS ──────────────────────────────────────────────────────────
  deploy:
    needs: [build-backend, build-ai-service]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker/"
          target: "/opt/smartai/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /opt/smartai/docker

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            if grep -q "IMAGE_BACKEND" .env 2>/dev/null; then
              sed -i "s|IMAGE_BACKEND=.*|IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest|" .env
              sed -i "s|IMAGE_AI=.*|IMAGE_AI=${{ env.IMAGE_AI }}:latest|" .env
            else
              echo "IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest" >> .env
              echo "IMAGE_AI=${{ env.IMAGE_AI }}:latest" >> .env
            fi

            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker pull ${{ env.IMAGE_AI }}:latest

            docker compose -f docker-compose.prod.yaml -f docker-compose.monitoring.yaml --env-file .env \
              up -d --no-build

            sleep 20
            BACKEND=$(curl -sf http://localhost:8080/actuator/health | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "UNKNOWN")
            AI=$(curl -sf http://localhost:8000/ai/health | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "UNKNOWN")
            echo "Backend=$BACKEND | AI=$AI"

      - name: Telegram — Deploy SUCCESS
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            🎉 <b>SmartAI — Deploy thành công!</b>

            ├ <b>Commit:</b> <code>${{ github.sha }}</code>
            ├ <b>By:</b> ${{ github.actor }}
            ├ <b>Message:</b> ${{ github.event.head_commit.message }}
            ├ <b>Backend:</b> ✅ UP
            ├ <b>AI Service:</b> ✅ UP
            └ <b>Dashboard:</b> http://${{ secrets.VPS_HOST }}:3000

      - name: Telegram — Deploy FAILED
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            🚨 <b>SmartAI — Deploy THẤT BẠI!</b>

            ├ <b>Commit:</b> <code>${{ github.sha }}</code>
            ├ <b>Branch:</b> ${{ github.ref_name }}
            └ <b>Log:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ⚠️ Kiểm tra VPS ngay!
