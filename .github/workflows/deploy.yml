name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # GHCR push

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/datnguyencoder/smartai-backend
  IMAGE_AI: ghcr.io/datnguyencoder/smartai-ai-service

jobs:
  # ── Build Backend ──────────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: cd backend && ./mvnw -B package -DskipTests

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build AI Service ───────────────────────────────────────────────────────
  build-ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_AI }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: ai-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Deploy to VPS ──────────────────────────────────────────────────────────
  deploy:
    needs: [build-backend, build-ai-service]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker/"
          target: "/opt/smartai/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /opt/smartai/docker

            # Login GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Cập nhật .env để dùng image từ GHCR
            if grep -q "IMAGE_BACKEND" .env 2>/dev/null; then
              sed -i "s|IMAGE_BACKEND=.*|IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest|" .env
              sed -i "s|IMAGE_AI=.*|IMAGE_AI=${{ env.IMAGE_AI }}:latest|" .env
            else
              echo "IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest" >> .env
              echo "IMAGE_AI=${{ env.IMAGE_AI }}:latest" >> .env
            fi

            # Pull images mới
            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker pull ${{ env.IMAGE_AI }}:latest

            # Update docker-compose.prod.yaml để dùng image thay vì build
            # (đã có sẵn backend/ai-service trong compose, chỉ cần restart với image mới)
            docker compose -f docker-compose.prod.yaml -f docker-compose.monitoring.yaml --env-file .env \
              up -d --no-build

            # Health check
            sleep 15
            curl -sf http://localhost:8080/actuator/health | python3 -c "import json,sys; d=json.load(sys.stdin); print('Backend:', d['status'])"
            echo "Deploy OK - $(date)"
