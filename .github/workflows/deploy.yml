name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # GHCR push

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/datnguyencoder/smartai-backend
  IMAGE_AI: ghcr.io/datnguyencoder/smartai-ai-service

jobs:
  # ── Notify: Build Started ──────────────────────────────────────────────────
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Telegram — Build Started
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json

          text = (
            "🚀 <b>SmartAI — Build Started</b>\n\n"
            f"├ <b>Commit:</b> <code>{os.environ['COMMIT_SHA'][:7]}</code>\n"
            f"├ <b>Branch:</b> {os.environ['BRANCH']}\n"
            f"├ <b>By:</b> {os.environ['ACTOR']}\n"
            f"└ <b>Message:</b> {os.environ['COMMIT_MSG']}\n\n"
            "⏳ Đang build Backend + AI Service..."
          )
          payload = json.dumps({
            "chat_id": os.environ['TG_CHAT'],
            "text": text,
            "parse_mode": "HTML"
          }).encode()
          req = urllib.request.Request(
            f"https://api.telegram.org/bot{os.environ['TG_TOKEN']}/sendMessage",
            data=payload,
            headers={"Content-Type": "application/json"},
            method="POST"
          )
          with urllib.request.urlopen(req) as r:
            print("Sent:", json.loads(r.read()).get("ok"))
          EOF

  # ── Build Backend ──────────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: notify-start
    outputs:
      tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: cd backend && ./mvnw -B package -DskipTests

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Telegram — Backend Build OK
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json
          payload = json.dumps({"chat_id": os.environ['TG_CHAT'],
            "text": "✅ <b>Backend image built & pushed</b> → GHCR",
            "parse_mode": "HTML"}).encode()
          req = urllib.request.Request(
            f"https://api.telegram.org/bot{os.environ['TG_TOKEN']}/sendMessage",
            data=payload, headers={"Content-Type": "application/json"}, method="POST")
          urllib.request.urlopen(req)
          EOF

      - name: Telegram — Backend Build FAILED
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json
          text = (
            "❌ <b>Backend Build FAILED!</b>\n\n"
            f"├ <b>Commit:</b> <code>{os.environ['SHA'][:7]}</code>\n"
            f"└ <b>Log:</b> https://github.com/{os.environ['REPO']}/actions/runs/{os.environ['RUN_ID']}"
          )
          payload = json.dumps({"chat_id": os.environ['TG_CHAT'],
            "text": text, "parse_mode": "HTML"}).encode()
          req = urllib.request.Request(
            f"https://api.telegram.org/bot{os.environ['TG_TOKEN']}/sendMessage",
            data=payload, headers={"Content-Type": "application/json"}, method="POST")
          urllib.request.urlopen(req)
          EOF

  # ── Build AI Service ───────────────────────────────────────────────────────
  build-ai-service:
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_AI }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: ai-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Telegram — AI Service Build OK
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json
          payload = json.dumps({"chat_id": os.environ['TG_CHAT'],
            "text": "✅ <b>AI Service image built & pushed</b> → GHCR",
            "parse_mode": "HTML"}).encode()
          req = urllib.request.Request(
            f"https://api.telegram.org/bot{os.environ['TG_TOKEN']}/sendMessage",
            data=payload, headers={"Content-Type": "application/json"}, method="POST")
          urllib.request.urlopen(req)
          EOF

      - name: Telegram — AI Service Build FAILED
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json
          text = (
            "❌ <b>AI Service Build FAILED!</b>\n\n"
            f"├ <b>Commit:</b> <code>{os.environ['SHA'][:7]}</code>\n"
            f"└ <b>Log:</b> https://github.com/{os.environ['REPO']}/actions/runs/{os.environ['RUN_ID']}"
          )
          payload = json.dumps({"chat_id": os.environ['TG_CHAT'],
            "text": text, "parse_mode": "HTML"}).encode()
          req = urllib.request.Request(
            f"https://api.telegram.org/bot{os.environ['TG_TOKEN']}/sendMessage",
            data=payload, headers={"Content-Type": "application/json"}, method="POST")
          urllib.request.urlopen(req)
          EOF

  # ── Deploy to VPS ──────────────────────────────────────────────────────────
  deploy:
    needs: [build-backend, build-ai-service]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker/"
          target: "/opt/smartai/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /opt/smartai/docker

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            if grep -q "IMAGE_BACKEND" .env 2>/dev/null; then
              sed -i "s|IMAGE_BACKEND=.*|IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest|" .env
              sed -i "s|IMAGE_AI=.*|IMAGE_AI=${{ env.IMAGE_AI }}:latest|" .env
            else
              echo "IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest" >> .env
              echo "IMAGE_AI=${{ env.IMAGE_AI }}:latest" >> .env
            fi

            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker pull ${{ env.IMAGE_AI }}:latest

            docker compose -f docker-compose.prod.yaml -f docker-compose.monitoring.yaml --env-file .env \
              up -d --no-build

            sleep 20
            BACKEND=$(curl -sf http://localhost:8080/actuator/health | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "UNKNOWN")
            AI=$(curl -sf http://localhost:8000/ai/health | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "UNKNOWN")
            echo "Backend=$BACKEND | AI=$AI"
            echo "Deploy OK - $(date)"

      - name: Telegram — Deploy SUCCESS
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json
          text = (
            "🎉 <b>SmartAI — Deploy thành công!</b>\n\n"
            f"├ <b>Commit:</b> <code>{os.environ['SHA'][:7]}</code>\n"
            f"├ <b>By:</b> {os.environ['ACTOR']}\n"
            f"├ <b>Message:</b> {os.environ['COMMIT_MSG']}\n"
            f"├ <b>Backend:</b> ✅ UP\n"
            f"├ <b>AI Service:</b> ✅ UP\n"
            f"└ <b>Dashboard:</b> http://{os.environ['VPS_HOST']}:3000"
          )
          payload = json.dumps({"chat_id": os.environ['TG_CHAT'],
            "text": text, "parse_mode": "HTML"}).encode()
          req = urllib.request.Request(
            f"https://api.telegram.org/bot{os.environ['TG_TOKEN']}/sendMessage",
            data=payload, headers={"Content-Type": "application/json"}, method="POST")
          with urllib.request.urlopen(req) as r:
            print("Deploy notified:", json.loads(r.read()).get("ok"))
          EOF

      - name: Telegram — Deploy FAILED
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json
          text = (
            "🚨 <b>SmartAI — Deploy THẤT BẠI!</b>\n\n"
            f"├ <b>Commit:</b> <code>{os.environ['SHA'][:7]}</code>\n"
            f"├ <b>Branch:</b> {os.environ['BRANCH']}\n"
            f"└ <b>Log:</b> https://github.com/{os.environ['REPO']}/actions/runs/{os.environ['RUN_ID']}\n\n"
            "⚠️ Kiểm tra VPS ngay!"
          )
          payload = json.dumps({"chat_id": os.environ['TG_CHAT'],
            "text": text, "parse_mode": "HTML"}).encode()
          req = urllib.request.Request(
            f"https://api.telegram.org/bot{os.environ['TG_TOKEN']}/sendMessage",
            data=payload, headers={"Content-Type": "application/json"}, method="POST")
          urllib.request.urlopen(req)
          EOF
