name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # GHCR push

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/datnguyencoder/smartai-backend
  IMAGE_AI: ghcr.io/datnguyencoder/smartai-ai-service
  TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  # ── Notify: Build Started ──────────────────────────────────────────────────
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Telegram — Build Started
        run: |
          MSG="🚀 <b>SmartAI — Build Started</b>%0A%0A"
          MSG+="├ <b>Commit:</b> <code>${{ github.sha }}</code>%0A"
          MSG+="├ <b>Branch:</b> ${{ github.ref_name }}%0A"
          MSG+="├ <b>By:</b> ${{ github.actor }}%0A"
          MSG+="└ <b>Message:</b> ${{ github.event.head_commit.message }}%0A%0A"
          MSG+="⏳ Đang build Backend + AI Service..."
          curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="$MSG" > /dev/null

  # ── Build Backend ──────────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: notify-start
    outputs:
      tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: cd backend && ./mvnw -B package -DskipTests

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Telegram — Backend Build OK
        if: success()
        run: |
          curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>Backend image built</b> — pushed to GHCR" > /dev/null

      - name: Telegram — Backend Build FAILED
        if: failure()
        run: |
          curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>Backend Build FAILED!</b>%0A%0A<b>Commit:</b> <code>${{ github.sha }}</code>%0AXem log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" > /dev/null

  # ── Build AI Service ───────────────────────────────────────────────────────
  build-ai-service:
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_AI }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: ai-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Telegram — AI Service Build OK
        if: success()
        run: |
          curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>AI Service image built</b> — pushed to GHCR" > /dev/null

      - name: Telegram — AI Service Build FAILED
        if: failure()
        run: |
          curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>AI Service Build FAILED!</b>%0A%0A<b>Commit:</b> <code>${{ github.sha }}</code>%0AXem log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" > /dev/null

  # ── Deploy to VPS ──────────────────────────────────────────────────────────
  deploy:
    needs: [build-backend, build-ai-service]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker/"
          target: "/opt/smartai/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /opt/smartai/docker

            # Login GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Cập nhật .env để dùng image từ GHCR
            if grep -q "IMAGE_BACKEND" .env 2>/dev/null; then
              sed -i "s|IMAGE_BACKEND=.*|IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest|" .env
              sed -i "s|IMAGE_AI=.*|IMAGE_AI=${{ env.IMAGE_AI }}:latest|" .env
            else
              echo "IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest" >> .env
              echo "IMAGE_AI=${{ env.IMAGE_AI }}:latest" >> .env
            fi

            # Pull images mới
            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker pull ${{ env.IMAGE_AI }}:latest

            # Deploy với cả prod + monitoring stack
            docker compose -f docker-compose.prod.yaml -f docker-compose.monitoring.yaml --env-file .env \
              up -d --no-build

            # Health check sau deploy
            sleep 20
            BACKEND_STATUS=$(curl -sf http://localhost:8080/actuator/health | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "UNKNOWN")
            AI_STATUS=$(curl -sf http://localhost:8000/ai/health | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "UNKNOWN")
            echo "Backend: $BACKEND_STATUS | AI: $AI_STATUS"
            echo "Deploy OK - $(date)"

      - name: Telegram — Deploy SUCCESS
        if: success()
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          MSG="🎉 <b>SmartAI — Deploy thành công!</b>%0A%0A"
          MSG+="├ <b>Commit:</b> <code>$SHORT_SHA</code>%0A"
          MSG+="├ <b>By:</b> ${{ github.actor }}%0A"
          MSG+="├ <b>Message:</b> ${{ github.event.head_commit.message }}%0A"
          MSG+="├ <b>Backend:</b> ✅ UP%0A"
          MSG+="├ <b>AI Service:</b> ✅ UP%0A"
          MSG+="└ <b>VPS:</b> ${{ secrets.VPS_HOST }}%0A%0A"
          MSG+="🔗 Dashboard: http://${{ secrets.VPS_HOST }}:3000"
          curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="$MSG" > /dev/null

      - name: Telegram — Deploy FAILED
        if: failure()
        run: |
          MSG="🚨 <b>SmartAI — Deploy THẤT BẠI!</b>%0A%0A"
          MSG+="├ <b>Commit:</b> <code>${{ github.sha }}</code>%0A"
          MSG+="├ <b>Branch:</b> ${{ github.ref_name }}%0A"
          MSG+="└ <b>Xem log:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A%0A"
          MSG+="⚠️ Kiểm tra VPS ngay!"
          curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="$MSG" > /dev/null
