name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build all images (ignore path filters)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/datnguyencoder/smartai-backend
  IMAGE_AI: ghcr.io/datnguyencoder/smartai-ai-service

jobs:
  # ── Detect changes ─────────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai_service: ${{ steps.filter.outputs.ai_service }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            ai_service:
              - 'ai-service/**'
            docker:
              - 'docker/**'

  # ── Notify: Build Started ──────────────────────────────────────────────────
  notify-start:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      needs.detect-changes.outputs.ai_service == 'true' ||
      needs.detect-changes.outputs.docker == 'true' ||
      github.event.inputs.force_build == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Get commit subject
        id: meta
        run: echo "subject=$(git log -1 --format='%s')" >> $GITHUB_OUTPUT

      - name: Telegram — Build Started
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            🚀 <b>SmartAI — Build Started</b>

            ├ <b>Commit:</b> <code>${{ github.sha }}</code>
            ├ <b>Branch:</b> ${{ github.ref_name }}
            ├ <b>By:</b> ${{ github.actor }}
            ├ <b>Message:</b> ${{ steps.meta.outputs.subject }}
            ├ <b>Backend:</b> ${{ needs.detect-changes.outputs.backend == 'true' && '🔨 rebuild' || '⏭ skip' }}
            └ <b>AI Service:</b> ${{ needs.detect-changes.outputs.ai_service == 'true' && '🔨 rebuild' || '⏭ skip' }}

  # ── Build Backend ──────────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: [detect-changes, notify-start]
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      github.event.inputs.force_build == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: cd backend && ./mvnw -B package -DskipTests

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Telegram — Backend OK
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: "✅ <b>Backend image built & pushed</b> → GHCR"

      - name: Telegram — Backend FAILED
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            ❌ <b>Backend Build FAILED!</b>

            ├ <b>Commit:</b> <code>${{ github.sha }}</code>
            └ <b>Log:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ── Build AI Service ───────────────────────────────────────────────────────
  build-ai-service:
    runs-on: ubuntu-latest
    needs: [detect-changes, notify-start]
    if: |
      needs.detect-changes.outputs.ai_service == 'true' ||
      github.event.inputs.force_build == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_AI }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: ai-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Telegram — AI Service OK
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: "✅ <b>AI Service image built & pushed</b> → GHCR"

      - name: Telegram — AI Service FAILED
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            ❌ <b>AI Service Build FAILED!</b>

            ├ <b>Commit:</b> <code>${{ github.sha }}</code>
            └ <b>Log:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ── Deploy to VPS ──────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-ai-service]
    # Chạy nếu ít nhất 1 trong 2 job build chạy và không fail
    # always() để deploy ngay cả khi job bị skip
    if: |
      always() &&
      (needs.detect-changes.outputs.backend == 'true' ||
       needs.detect-changes.outputs.ai_service == 'true' ||
       needs.detect-changes.outputs.docker == 'true' ||
       github.event.inputs.force_build == 'true') &&
      needs.build-backend.result != 'failure' &&
      needs.build-ai-service.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker/"
          target: "/opt/smartai/"
          timeout: 60s
          command_timeout: 5m

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            cd /opt/smartai/docker

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Đợi mọi thao tác docker (rm/create) đang dang dở kết thúc trước khi tự deploy,
            # tránh lỗi "removal of container ... is already in progress" khi trùng với
            # thao tác thủ công/song song trên VPS.
            for i in $(seq 1 12); do
              if docker ps -a --filter "status=removing" --format '{{.ID}}' | grep -q .; then
                echo "Đang chờ container cũ gỡ xong (lần $i)..."
                sleep 5
              else
                break
              fi
            done

            # Dọn container "ma" còn sót từ lần recreate bị ngắt giữa chừng trước đó —
            # Docker Compose đặt tên tạm dạng <hash>_smartmart_xxx khi rename cuối cùng
            # không hoàn tất, gây "Conflict: name already in use" ở lần deploy kế tiếp.
            docker ps -a --format '{{.Names}}' | grep -E '^[a-f0-9]{12}_smartmart_' | while read -r ghost; do
              echo "Xóa container ma: $ghost"
              docker rm -f "$ghost" || true
            done

            # Chỉ pull image mới nếu job tương ứng đã build
            BACKEND_BUILT="${{ needs.build-backend.result }}"
            AI_BUILT="${{ needs.build-ai-service.result }}"

            if [ "$BACKEND_BUILT" = "success" ]; then
              echo "Pulling new backend image..."
              docker pull ${{ env.IMAGE_BACKEND }}:latest
              if grep -q "IMAGE_BACKEND" .env 2>/dev/null; then
                sed -i "s|IMAGE_BACKEND=.*|IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest|" .env
              else
                echo "IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest" >> .env
              fi
            fi

            if [ "$AI_BUILT" = "success" ]; then
              echo "Pulling new AI service image..."
              docker pull ${{ env.IMAGE_AI }}:latest
              if grep -q "IMAGE_AI" .env 2>/dev/null; then
                sed -i "s|IMAGE_AI=.*|IMAGE_AI=${{ env.IMAGE_AI }}:latest|" .env
              else
                echo "IMAGE_AI=${{ env.IMAGE_AI }}:latest" >> .env
              fi
            fi

            docker compose -f docker-compose.prod.yaml -f docker-compose.monitoring.yaml --env-file .env \
              up -d --no-build --remove-orphans

            sleep 20
            BACKEND=$(curl -sf http://localhost:8080/actuator/health | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "UNKNOWN")
            AI=$(curl -sf http://localhost:8000/ai/health | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "UNKNOWN")
            echo "Backend=$BACKEND | AI=$AI"

      - name: Get commit subject
        id: meta
        run: echo "subject=$(git log -1 --format='%s')" >> $GITHUB_OUTPUT

      - name: Telegram — Deploy SUCCESS
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            🎉 <b>SmartAI — Deploy thành công!</b>

            ├ <b>Commit:</b> <code>${{ github.sha }}</code>
            ├ <b>By:</b> ${{ github.actor }}
            ├ <b>Message:</b> ${{ steps.meta.outputs.subject }}
            ├ <b>Backend:</b> ${{ needs.build-backend.result == 'success' && '🔨 rebuilt' || '⏭ skipped' }}
            ├ <b>AI Service:</b> ${{ needs.build-ai-service.result == 'success' && '🔨 rebuilt' || '⏭ skipped' }}
            └ <b>Dashboard:</b> http://${{ secrets.VPS_HOST }}:3000

      - name: Telegram — Deploy FAILED
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            🚨 <b>SmartAI — Deploy THẤT BẠI!</b>

            ├ <b>Commit:</b> <code>${{ github.sha }}</code>
            ├ <b>Branch:</b> ${{ github.ref_name }}
            └ <b>Log:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ⚠️ Kiểm tra VPS ngay!
