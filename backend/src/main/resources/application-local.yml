# Local dev (IntelliJ / mvn spring-boot:run): PostgreSQL on localhost — same schema as Docker prod.
spring:
  cache:
    type: simple
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartmart_db}
    username: ${SPRING_DATASOURCE_USERNAME:smartmart_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:SuperSecurePassword2026}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  kafka:
    listener:
      enabled: false

# Override PayOS for local dev so it doesn't crash if env vars are missing
payos:
