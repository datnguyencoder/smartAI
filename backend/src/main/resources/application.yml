server:
  port: 8080
  # Ngrok HTTPS → Spring dùng X-Forwarded-Proto (tránh OpenAPI server url http://)
  forward-headers-strategy: framework

spring:
  application:
    name: smartmart-backend
  profiles:
    # local = PostgreSQL localhost (Flyway). Docker sets SPRING_PROFILES_ACTIVE=prod.
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Redis (override host/port theo profile / env)
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # Kafka
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: smartmart-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Swagger / springdoc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Custom Application Configs

payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_API_KEY}
  checksum-key: ${PAYOS_CHECKSUM_KEY}

app:
  jwt:
    secret: ${JWT_SECRET:smartmart-super-secret-key-32-bytes-long-for-jwt-signing}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}        # 15 minutes
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
  cerebras:
    api-key: ${CEREBRAS_API_KEY:}
    base-url: ${CEREBRAS_BASE_URL:https://api.cerebras.ai/v1}
    model: ${CEREBRAS_MODEL:gpt-oss-120b}
  ai:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
    auto-train-on-startup: ${AI_AUTO_TRAIN_ON_STARTUP:true}
  seed:
    retail-sales:
      enabled: ${SEED_RETAIL_SALES:true}
      csv: data/retail/uci_online_retail_daily.csv
  report:
    footer:
      text: ${REPORT_FOOTER_TEXT:BÁO CÁO NỘI BỘ - BẢO MẬT}