    type: simple
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      enabled: false
    consumer:
      group-id: smartmart-test

