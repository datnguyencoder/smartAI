services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartmart_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartmart_db}
      POSTGRES_USER: ${POSTGRES_USER:-smartmart_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartmart_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartmart_admin} -d ${POSTGRES_DB:-smartmart_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: smartmart_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - smartmart_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 192M

  kafka:
    image: apache/kafka:3.7.0
    container_name: smartmart_kafka
    hostname: kafka
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Không đặt limit thì JVM tự ước lượng heap theo RAM host thấy được (không phải
      # RAM cgroup của container) — trên VPS yếu dễ gây heap quá lớn → GC liên tục → CPU cao.
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    networks:
      - smartmart_network
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092" ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  ai-service:
    image: ${IMAGE_AI:-ghcr.io/datnguyencoder/smartai-ai-service:latest}
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: smartmart_ai_service
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartmart_admin}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-smartmart_db}
      - FASTAPI_ENV=${FASTAPI_ENV:-production}
    volumes:
      - ai_models_data:/app/app/saved_models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartmart_network
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ai/health', timeout=5)" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  backend:
    image: ${IMAGE_BACKEND:-ghcr.io/datnguyencoder/smartai-backend:latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: smartmart_backend
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-smartmart_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-smartmart_admin}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - CEREBRAS_BASE_URL=${CEREBRAS_BASE_URL:-https://api.cerebras.ai/v1}
      - CEREBRAS_MODEL=${CEREBRAS_MODEL:-gpt-oss-120b}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-900000}
      - JWT_REFRESH_EXPIRATION_MS=${JWT_REFRESH_EXPIRATION_MS:-604800000}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-demo}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-demo}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-demo}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - SPRING_CACHE_TYPE=redis
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai-service:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - smartmart_network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    # Memory limit phải có đủ đệm ngoài JAVA_OPTS -Xmx: JVM còn cần metaspace, JIT code
    # cache, thread stack (mỗi thread ~1MB, Tomcat pool có thể tới vài chục thread cùng
    # lúc), direct buffer cho Kafka/Redis client... 1024M từng bị OOM-kill trên thực tế
    # (backend DOWN) nên nâng lên 1536M để có biên an toàn rộng hơn nhiều.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ai_models_data:
    driver: local

networks:
  smartmart_network:
    driver: bridge
