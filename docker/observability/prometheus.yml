global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    project: smartmart
    env: production

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── Spring Boot Backend ───────────────────────────────────────────────────
  - job_name: smartmart_backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'backend:8080' ]
        labels:
          service: backend

  # ── FastAPI AI Service ────────────────────────────────────────────────────
  - job_name: smartmart_ai_service
    metrics_path: /metrics
    static_configs:
      - targets: [ 'ai-service:8000' ]
        labels:
          service: ai-service

  # ── VPS System (Node Exporter) ────────────────────────────────────────────
  - job_name: node_vps
    static_configs:
      - targets: [ 'node-exporter:9100' ]
        labels:
          instance: vps-gencloud

  # ── Docker Containers (cAdvisor) ─────────────────────────────────────────
  - job_name: cadvisor
    static_configs:
      - targets: [ 'cadvisor:8080' ]
        labels:
          instance: vps-gencloud

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: [ 'postgres-exporter:9187' ]
        labels:
          service: postgres

  # ── Redis ─────────────────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: [ 'redis-exporter:9121' ]
        labels:
          service: redis

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: [ 'localhost:9090' ]
